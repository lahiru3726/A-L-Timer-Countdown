<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AL EXAM TIMER</title>
  <link rel="stylesheet" href="countdown.css" />
</head>
<body>
  <!-- NAVIGATION BAR -->
  <nav class="navbar">
    <span class="nav-brand">AL TIMER</span>
    <span class="nav-brand">AL TIMER</span>
  </nav>

  <!-- MAIN BODY -->
  <main class="main-body">
    <div class="title-block">
      <h1 class="title-al">AL EXAM</h1>
      <p class="title-timer">TIMER</p>
    </div>

    <!-- CIRCLE COUNTDOWN -->
    <div class="circle-wrapper">
      <svg class="progress-ring" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <!-- Light blue outline -->
        <circle class="ring-bg" cx="200" cy="200" r="175" />
        <!-- Animated progress arc -->
        <circle class="ring-progress" id="ringProgress" cx="200" cy="200" r="175" />
      </svg>

      <div class="circle-content" id="circleContent">
        <!-- ROW 1: Years / Months / Days (hidden if not needed) -->
        <div class="time-row row-top" id="rowTop">
          <div class="time-unit" id="unitYear">
            <span class="time-value" id="valYear">01</span>
            <span class="time-label">YEAR</span>
          </div>
          <div class="time-sep top-sep">:</div>
          <div class="time-unit" id="unitMonth">
            <span class="time-value" id="valMonth">12</span>
            <span class="time-label">MONTHS</span>
          </div>
          <div class="time-sep top-sep">:</div>
          <div class="time-unit" id="unitDay">
            <span class="time-value" id="valDay">30</span>
            <span class="time-label">DAYS</span>
          </div>
        </div>

        <!-- ROW 2: Hours / Minutes / Seconds -->
        <div class="time-row row-bottom" id="rowBottom">
          <div class="time-unit" id="unitHour">
            <span class="time-value bottom-val" id="valHour">23</span>
            <span class="time-label bottom-label">HOURS</span>
          </div>
          <div class="time-sep bottom-sep">:</div>
          <div class="time-unit" id="unitMin">
            <span class="time-value bottom-val" id="valMin">59</span>
            <span class="time-label bottom-label">MINUTES</span>
          </div>
          <div class="time-sep bottom-sep">:</div>
          <div class="time-unit" id="unitSec">
            <span class="time-value bottom-val" id="valSec">59</span>
            <span class="time-label bottom-label">SECS</span>
          </div>
        </div>
      </div>
    </div>

    <!-- MOTIVATION TEXT -->
    <p class="motivation" id="motivation">STAY FOCUS!</p>
  </main>

  <script src="countdown.js"></script>
</body>
</html>
